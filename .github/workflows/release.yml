name: Build and Release PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended \
            texlive-fonts-extra texlive-latex-extra fonts-dejavu

      - name: Create output directory
        run: mkdir -p dist

      - name: Build PDF from manifest
        run: |
          # Skip front-matter.md in manifest (title page comes from metadata)
          FILES=$(grep -v 'front-matter.md' build/manifest.txt | tr '\n' ' ')
          echo "Building PDF from: $FILES"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          pandoc build/pdf-metadata.yaml $FILES \
            --from markdown \
            --to pdf \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=3 \
            --shift-heading-level-by=0 \
            --highlight-style=tango \
            --variable geometry:margin=1in \
            --variable fontsize=11pt \
            --variable mainfont="DejaVu Serif" \
            --variable sansfont="DejaVu Sans" \
            --variable monofont="DejaVu Sans Mono" \
            --variable colorlinks=true \
            --variable linkcolor=NavyBlue \
            --variable urlcolor=NavyBlue \
            --variable toccolor=black \
            --resource-path=standard:standard/images:. \
            -o "dist/rgr-standard-${{ steps.version.outputs.VERSION }}.pdf"
          echo "PDF built successfully:"
          ls -la dist/

      - name: Create stable-name copy for latest download link
        run: cp "dist/rgr-standard-${{ steps.version.outputs.VERSION }}.pdf" dist/rgr-standard-latest.pdf

      - name: List built artifacts
        run: ls -la dist/

      - name: Create GitHub Release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          name: "RGR Standard ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Reconstruction-Grade eDiscovery Standard

            Version: `${{ steps.version.outputs.VERSION }}`

            This release contains the versioned PDF artifact of the RGR Standard.
            The canonical HTML version is available on GitHub Pages.
          files: |
            dist/rgr-standard-*.pdf
          draft: false
          prerelease: false
