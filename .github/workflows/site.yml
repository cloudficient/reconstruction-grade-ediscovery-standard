name: Build and Deploy Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and Material theme
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions mkdocs-git-revision-date-localized-plugin mkdocs-rss-plugin

      - name: Build site
        run: mkdocs build --strict

      - name: Ensure Google verification file exists
        run: |
          echo "google-site-verification: google5fef6425ef4abf3f.html" > site/google5fef6425ef4abf3f.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow (Bing) of updated pages
        run: |
          sleep 10
          URLS=$(curl -s https://rgrstandard.org/sitemap.xml \
            | grep -oP '<loc>\K[^<]+' | head -100 \
            | jq -R -s 'split("\n") | map(select(length > 0))')
          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"rgrstandard.org\",
              \"key\": \"288f43373f0241bd9a0c7aa4a0bce57f\",
              \"keyLocation\": \"https://rgrstandard.org/288f43373f0241bd9a0c7aa4a0bce57f.txt\",
              \"urlList\": $URLS
            }"

      - name: Trigger RGR Assistant re-ingestion
        env:
          WEBHOOK_SECRET: ${{ secrets.RGR_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "RGR_WEBHOOK_SECRET not configured, skipping"
            exit 0
          fi
          BODY=""
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -binary | xxd -p -c 256)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://rgr-assistant-api.emeraldhill4306.com/webhook/ingest" \
            -H "X-Webhook-Signature: ${SIGNATURE}" \
            -d "$BODY")
          echo "RGR Assistant ingest trigger: HTTP ${HTTP_STATUS}"
